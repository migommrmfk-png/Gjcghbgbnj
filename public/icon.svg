<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep Emerald Green Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="50%" stop-color="#043e2f"/>
      <stop offset="100%" stop-color="#011410"/>
    </linearGradient>
    
    <!-- Real Metallic Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF08A"/>
      <stop offset="25%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="75%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <!-- Inner Emerald Green Graduate for Star Fill -->
    <linearGradient id="innerEmerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    
    <!-- High-fidelity glowing effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Main Rounded App Icon Base -->
  <rect width="512" height="512" rx="140" fill="url(#bg)"/>
  
  <!-- Subtle Decorative Geometric Background Grid Lines -->
  <g opacity="0.08" stroke="#FBBF24" stroke-width="1.5">
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <circle cx="256" cy="256" r="180" fill="none"/>
    <circle cx="256" cy="256" r="230" fill="none"/>
  </g>
  
  <!-- Background Fine-Line Rub el Hizb Star -->
  <g stroke="url(#gold)" stroke-width="6" stroke-linejoin="round" fill="none" opacity="0.3">
    <rect x="136" y="136" width="240" height="240" rx="12"/>
    <rect x="136" y="136" width="240" height="240" rx="12" transform="rotate(45 256 256)"/>
  </g>

  <!-- Solid Foreground Rub el Hizb Star -->
  <g stroke="url(#gold)" stroke-width="10" stroke-linejoin="round" fill="url(#innerEmerald)" filter="url(#glow)">
    <rect x="156" y="156" width="200" height="200" rx="16"/>
    <rect x="156" y="156" width="200" height="200" rx="16" transform="rotate(45 256 256)"/>
  </g>

  <!-- Concentric Inner Golden Circles -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="url(#gold)" stroke-width="4" stroke-dasharray="10 5" opacity="0.85"/>
  <circle cx="256" cy="256" r="78" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.5"/>

  <!-- Stylized Elegant Mosque Dome -->
  <path d="M 200,315 C 200,265 215,240 256,225 C 297,240 312,265 312,315 Z" fill="url(#gold)" filter="url(#glow)"/>
  
  <!-- Dome Base / Arch Accent -->
  <rect x="190" y="315" width="132" height="8" rx="3" fill="url(#gold)"/>
  <rect x="180" y="325" width="152" height="4" rx="2" fill="url(#gold)" opacity="0.6"/>

  <!-- Glorious Ascending Crescent Moon -->
  <path d="M 288,175 A 38,38 0 1,0 288,251 A 32,32 0 1,1 288,175 Z" fill="url(#gold)" filter="url(#glow)"/>
  
  <!-- Radiant Top Faith Star -->
  <g filter="url(#glow)">
    <polygon points="256,145 261,155 271,155 263,162 266,172 256,165 246,172 249,162 241,155 251,155" fill="#FFFFE3"/>
  </g>

  <!-- Symmetrical Accent Pearls -->
  <circle cx="185" cy="235" r="5" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="327" cy="235" r="5" fill="url(#gold)" filter="url(#glow)"/>
</svg>
